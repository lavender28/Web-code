<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>动态绑定</title>
  <style>
    .active {
      color: red;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- 1.v-bind的基本用法-->
    <!-- <a v-bind:href="url">访问 Vue 官网</a> -->
    <!-- 简写 ： -->
    <!-- <a :href="url">访问 Vue 官网</a> -->

    <!-- 动态绑定多个属性 -->
    <!-- <h2>{{ title }}</h2> -->
    <!-- <img :src="imageUrl" :alt="title"> -->
    <!-- 也可以写成一下形式 -->
    <!-- <img v-bind="{src: imageUrl, alt: title}"> -->
    <!-- <button @click="changeImage">切换图片</button> -->

    <!-- 动态参数 -->
    <!-- <a v-bind:[attributename]="url"> ... </a> -->
    <!-- 简写 -->
    <!-- <a :[attributename]="url"> ... </a> -->

    <!-- 2.绑定 HTML Class -->
    <!-- 2.1 对象语法 -->
    <!-- <div :class="{ active: isActive }">这是文本</div> -->

    <!-- 多个字段，与普通class共存 -->
    <!-- <div
      class="static"
      :class="{active: isActive, 'text-danger': hasError}"
    >这是文本</div> -->

    <!-- 直接绑定对象形式 -->
    <!-- <div class="static" :class="classObject">这是文本</div> -->

    <!-- 计算属性的方式返回 -->
    <!-- <div class="static" :class="classObj">这是文本</div> -->

    <!-- 2.2 数组语法 -->
    <!-- <div :class="['active', errorClass]">这是文本</div> -->

    <!-- 条件类名绑定（三元表达式） -->
    <!-- <div :class="[isActive ? 'active' : '', 'text-danger']">这是文本</div> -->
    
    <!-- 数组语法中使用对象语法 -->
    <!-- <div :class="['static-class', {active: isActive, 'text-danger': hasError}]">这是文本</div> -->

    <!-- 3. 绑定内联样式 -->
    <!-- 3.1 对象语法 -->
    <!-- <div :style="{color: textColor, fontSize: fontSize + 'px'}">这是文本</div> -->

    <!-- 3.2 数组语法 -->
    <h2>数组语法示例：组合多个样式对象</h2>
    <button @click="taggle">切换高亮</button>
    <p :style="[ baseStyle, highlight ? highlightStyle : {} ]">这是文本</p>
  </div>

  <script src="../js/vue.js"></script>
  <script>
    const app = Vue.createApp({
      data() {
        return {
          url: 'https://cn.vuejs.org/',
          title: '动态图片示例',
          imageUrl: 'https://picsum.photos/200/300?random=1',
          attributename: 'href',
          isActive: true,
          hasError: false,
          classObject: {
            active: true,
            'text-danger': true
          },
          errorClass: 'text-danger',
          textColor: 'red',
          fontSize: 20,
          baseStyle: {
            color: '#333',
            fontSize: '20px'
          },
          highlight: false
        }
      },
      methods: {
        changeImage() {
          this.imageUrl = 'https://picsum.photos/200/300?random=' + Math.floor(Math.random() * 10)
        },
        taggle() {
          this.highlight = !this.highlight
        }
      },
      computed: {
        classObj() {
          return {
            active: this.isActive,
            'text-danger': this.hasError
          }
        },
        highlightStyle() {
          return {
            backgroundColor: 'yellow',
            color: 'red',
            fontSize: '30px'
          }
        }
      }
    })
    app.mount("#app")
  </script>
</body>
</html>
