<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <div id="app">
    <!-- 1. v-for遍历数组 -->
    <h3>书籍列表</h3>
    <ul>
      <li v-for="(book, index) in books" :key="book.id">
        {{ index + 1 }} - 《{{ book.title }}》 - {{ book.author }}
      </li>
    </ul>
    
    <!-- 2. v-for遍历对象 -->
    <h3>用户信息</h3>
    <ul>
      <li v-for="(value, key) in user" :key="key">
        {{ key }}: {{ value }}
      </li>
    </ul>

    <!-- 3. v-for里使用范围值 -->
    <h3>数字循环</h3>
    <p v-for="n in 5" :key="n">
      当前数字：{{ n }}
    </p>

    <!-- 4. template上使用v-for -->
    <template v-for="book in books" :key="book.id">
      <p>{{ book.title }}</p>
      <p>{{ book.author }}</p>
      <hr>
    </template>
    
    <!-- 5.数组变化侦测 -->
    <h3>学生名单（数组变化侦测示例）</h3>
    <ul>
      <li v-for="(student, index) in students" :key="index">
        {{ index + 1 }}. {{ student }}
      </li>
    </ul>
    <button @click="clickBtn">学生变化</button>

  </div>
  <script src="../js/vue.js"></script>
  <script>
  const app = Vue.createApp({
    data() {
      return {
        books: [
          { id:1, title: '三体', author: '刘慈欣' },
          { id:2, title: '百年孤独', author: '加西亚·马尔克斯' },
          { id:3, title: '活着', author: '余华' }
        ],
        user: {
          name: '张三',
          age: 20,
          city: '温州'
        },
        students: ['张三', '李四', '王五'],
      }
    },
    methods: {
      clickBtn() {
        // this.students.push('赵六')
        // this.students.pop()
        // this.students.shift()
        // this.students.unshift('赵六')
        // this.students.sort()
        // this.students.reverse()
        // this.students.splice(1, 2, '赵六')
        // this.students.slice(1, 3)
        this.students = this.students.slice(1, 3)
      }
    }
  })
  app.mount("#app")
  </script>
</body>
</html>
