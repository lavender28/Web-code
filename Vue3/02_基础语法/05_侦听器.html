<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>侦听器 watch</title>
</head>
<body>
  <div id="app">
    <!-- 监听简单数据源 -->
    <p>问题：{{ question }}</p>
    <input v-model.lazy="answer" placeholder="请输入答案">

    <!-- 监听多个数据源 -->
    <h3>密码一致性验证</h3>
    <label>密码：<input v-model="password1" type="password"></label><br>
    <label>确认密码：<input v-model="password2" type="password"></label>
    <p v-if="isMatch" style="color:green">✅ 密码一致</p>
    <p v-else-if="password1 && password2" style="color:red">❌ 密码不一致</p>

    <!-- 监听对象 -->
    <h3>用户资料</h3>
    <label>姓名：<input v-model="user.name"></label><br>
    <label>年龄：<input v-model.number="user.age" type="number"></label>
    <p>用户信息：{{ user.name }}（{{ user.age }}岁）</p>

    <!-- 立即执行 -->
    <h3>立即执行监听</h3>
    <p>当前分数：{{ score }}</p>
  </div>
  <script src="../js/vue.js"></script>
  <script>
    const app = Vue.createApp({
      data() {
        return {
          question: '1 + 1 等于几？',
          answer: '',
          password1: '',
          password2: '',
          isMatch: false,
          user: {
            name: '小张',
            age: 20
          },
          score: 90
        }
      },
      watch: {
        // 侦听 answer 的变化
        answer(newValue, oldValue) {
          if (newValue === '2' || newValue === '二') {
            alert('回答正确！')
          } else if (newValue.length > 0) {  
            alert('请再想想...')
          }
        },
        // 侦听 password1 的变化
        password1() {
          this.checkMatch()
        },
        // 侦听 password2 的变化
        password2() {
          this.checkMatch()
        },
        user: {
          handler(newValue) {
            console.log('用户资料已更新：', newValue)
          },
          deep: true   // 深度侦听对象内部的变化
        },
        score: {
          handler(newValue) {
            console.log('当前分数为：', newValue)
          },
          immediate: true  // 立即执行一次
        }
      },
      methods: {
        checkMatch() {
          this.isMatch = this.password1 === this.password2 && this.password1.length > 0
        }
      }
    })
    app.mount("#app")
  </script>
</body>
</html>
