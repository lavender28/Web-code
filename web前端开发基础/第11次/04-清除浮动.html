<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>清除浮动</title>
  <style>
    .father { background-color: #c0c0c0; border: 1px dashed #666; overflow: hidden; }
    .box1, .box2, .box3 {
      line-height: 40px;
      background-color: #9F6;
      margin: 15px;
      height: 40px;
      padding: 0px 10px;
      border: 1px solid #999;
      float: left;
    }
    /* p { background-color: #CCF; border: 1px dashed #C0F; margin: 15px; clear: left; } */
  </style>
</head>
<body>
  <div class="father">
    <div class="box1">box1</div>
    <div class="box2">box2</div>
    <div class="box3">box3</div>
    <!-- <p>这是段落内容...</p> -->
    <!-- <div style="clear: left;"></div>   空标记,专门用于清除浮动 -->
  </div>
</body>
</html>
