<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>固定定位</title>
  <style>
  /* 固定在页面右下角的"返回顶部"按钮 */
  .back-to-top {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 50px;
    height: 50px;
    background: #c0392b;
    color: #fff;
}
  </style>
</head>
<body>
  <div class="back-to-top">
    返回顶部
  </div>
</body>
</html>
