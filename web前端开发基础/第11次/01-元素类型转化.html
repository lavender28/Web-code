<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>元素浮动</title>
  <style>
    a {
      display: block;
      border: 1px solid red;
      width: 200px;
      height: 50px;
    }
    p {
      display: inline;
      border: 1px solid blue;
      width: 200px;
      height: 50px;
    }
  </style>
</head>
<body>
  <a href="#">行内元素转成块元素</a>
  <a href="#">行内元素转成块元素</a>
  <a href="#">行内元素转成块元素</a>
  <p>块元素转成行内元素</p>
  <p>块元素转成行内元素</p>
  <p>块元素转成行内元素</p>
</body>
</html>
