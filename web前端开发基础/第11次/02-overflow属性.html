<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>overflow 属性演示</title>
  <style>
  .overflow-demo {
    display: inline-block;
    width: 150px;
    height: 80px;
    border: 2px solid #333;
    margin: 10px;
    vertical-align: top;
    font-size: 14px;
  }
  .overflow-demo span {
    display: block;
    background: #eee;
    text-align: center;
    margin-bottom: 4px;
    font-weight: bold;
  }
  </style>
</head>
<body>
  <!-- visible（默认）：内容溢出仍显示 -->
  <div class="overflow-demo" style="overflow: visible;">
    <span>visible</span>
    这是一段很长很长很长很长的文字内容，会超出容器边界显示。
  </div>

  <!-- hidden：溢出部分被裁剪隐藏 -->
  <div class="overflow-demo" style="overflow: hidden;">
    <span>hidden</span>
    这是一段很长很长很长很长的文字内容，溢出部分被隐藏裁切掉了。
  </div>

  <!-- scroll：始终显示滚动条 -->
  <div class="overflow-demo" style="overflow: scroll;">
    <span>scroll</span>
    这是一段很长很长很长很长的文字内容，出现滚动条可以滚动查看。
  </div>

  <!-- auto：内容溢出时才出现滚动条 -->
  <div class="overflow-demo" style="overflow: auto;">
    <span>auto</span>
    这是一段很长很长很长很长的文字内容，仅在溢出时自动出现滚动条。
  </div>
</body>
</html>
