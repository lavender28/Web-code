<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>链接伪类</title>
  <style>
    a:link {
      color: #534AB7;
      text-decoration: none
    }

    a:visited {
      color: #888780;
    }

    a:hover {
      color: red;
    }

    a:active {
      color: black;
    }
  </style>
</head>

<body>
  <a href="www.jingdong.com">这是一个链接</a>
</body>

</html>
