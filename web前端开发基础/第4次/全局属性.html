<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全局属性</title>
</head>

<body>
  <p>
    元素拖动属性：在网页中无法显示拖动效果，必须与JavaScript结合才能实现拖动功能
  </p>
  <img src="images/wlw.png" width="460" height="344" draggable="true">

  <hr>
  设置图片隐藏，不显示
  <img src="images/wlw.png" width="460" height="344" hidden>

  <hr>
  spellcheck属性值为true：<br><br>
  <textarea cols="40" rows="3" spellcheck="true"></textarea>
  <br><br>
  spellcheck属性值为false：<br><br>
  <textarea cols="40" rows="3" spellcheck="false"></textarea>

  <hr>
  <h2>不可编辑的菜单</h2>
  <ul>
    <li>菜单1</li>
    <li>菜单2</li>
    <li>菜单3</li>
    <li>菜单4</li>
  </ul>

  <h2 contenteditable="true">可编辑的菜单</h2>
  <ul contenteditable="true">
    <li>菜单1</li>
    <li>菜单2</li>
    <li>菜单3</li>
    <li>菜单4</li>
  </ul>
</body>

</html>
