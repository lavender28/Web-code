  <title>层次语义标签</title>
</head>

<body>
  <p>我们每天早上 <time>9:00</time> 开始营业。</p>
  <p>我在 <time datetime="2018-02-14">情人节</time> 有个约会。</p>
  <p>丫丫记录于 <time datetime="2017-10-27" pubdate="pubdate">2017-10-27</time></p>

  <mark>一去不复返</mark>呢？——是有人偷了他们罢……
  从水盆里，<mark>从水盆里过去</mark>；
  吃饭的时候，日子<mark>从饭碗里过去</mark>；
  默默时，便<mark>从凝然的双眼前过去</mark>。

  <p>山不在高，有仙则名。水不在深，有龙则灵。</p>
  <cite>——《陋室铭》</cite>
</body>

</html>
