<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>并集选择器</title>
  <style>
    /* 并集选择器：混合使用标记、类、 h1, */
    h2,
    h3 {
      color: #2c3e50;
      font-family: "黑体"
    }

    /* 并集选择器：混合使用标记、类、ID选择器 */
    p,
    .intro,
    #footer {
      color: blue;
      font-size: 12px;
    }
  </style>
</head>

<body>
  <h1>一级标题</h1>
  <h2>二级标题</h2>
  <h3>三级标题</h3>
  <div class="intro">介绍段落</div>
  <p>普通段落</p>
  <div id="footer">页脚内容</div>
</body>

</html>
