<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音乐播放界面</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="player-wrapper">
    <div class="music-player">

      <!-- 专辑封面 -->
      <div class="album-cover">
        <img src="images/cover.jpg" alt="专辑封面">
      </div>

      <!-- 歌曲信息区 -->
      <div class="song-info">

        <!-- 歌曲名和歌手 -->
        <div class="song-meta">
          <h2 class="song-title">晴天</h2>
          <p class="song-artist">周杰伦 · 叶惠美</p>
        </div>

        <!-- 音频播放器（多格式兼容）-->
        <div class="audio-wrap">
          <audio controls="controls">
            <source src="music/qingtian.ogg" type="audio/ogg">
            <source src="music/qingtian.mp3" type="audio/mpeg">
            您的浏览器不支持 audio 标签
          </audio>
        </div>

      </div>

    </div>
  </div>

</body>
</html>
