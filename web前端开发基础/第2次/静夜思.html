  <title>静夜思</title>
</head>

<body>
  <h3 align="center">静夜思</h3>
  <hr align="center" width="100px" size="3px" color="red">
  <p align="center">
    作者：李白
  </p>
  <p align="center">
    床前明月光，<br>
    疑是地上霜。<br>
    举头望明月，<br>
    低头思故乡。<br>
  </p>
</body>
