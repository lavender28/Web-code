<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>通配符选择器的使用</title>
  <style type="text/css">
    /* 通配符选择器：作用于页面所有元素 */
    * {
      margin: 0;
      padding: 0;
      font-family: "微软雅黑", Arial, sans-serif;
    }

    /* 标记选择器：在通配符基础上进一步设置body */
    body {
      background-color: #f5f5f5;
      color: #333;
    }
  </style>
</head>

<body>
  <h1>通配符选择器的应用</h1>
  <p>页面中所有元素都会受到通配符选择器的影响。</p>
  <ul>
    <li>列表项1</li>
    <li>列表项2</li>
  </ul>
</body>

</html>
